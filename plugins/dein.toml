[[plugins]]
repo = 'Shougo/dein.vim'

[[plugins]]
repo = 'bfrg/vim-cuda-syntax'
hook_add = '''
" Highlight keywords from CUDA Runtime API
let g:cuda_runtime_api_highlight = 1

" Highlight keywords from CUDA Driver API
let g:cuda_driver_api_highlight = 1

" Highlight keywords from CUDA Thrust library
let g:cuda_thrust_highlight = 1

" Disable highlighting of CUDA kernel calls
let g:cuda_no_kernel_highlight = 1
'''

[[plugins]]
repo = 'ncm2/float-preview.nvim'
if = 'has("nvim")'
hook_add = '''
  let g:float_preview#docked = 1

  function! DisableExtras()
    call nvim_win_set_option(g:float_preview#win, 'number', v:false)
    call nvim_win_set_option(g:float_preview#win, 'relativenumber', v:false)
    call nvim_win_set_option(g:float_preview#win, 'cursorline', v:false)
  endfunction

  autocmd User FloatPreviewWinOpen call DisableExtras()
'''

[[plugins]]
repo = 'neoclide/coc.nvim'
rev = 'master'
# coc.nvim uses npm (ships package-lock.json, no yarn.lock). `npm ci` installs
# from the lockfile and runs the `prepare` hook that builds build/index.js.
build = 'npm ci'
merged = false
hook_add = """
  source ~/.config/nvim/plugins/coc.rc.vim
"""

[[plugins]]
repo = 'yaegassy/coc-ruff'
build = 'yarn install --frozen-lockfile'

[[plugins]]
repo = 'sff1019/vim-brogrammer-theme'

[[plugins]]
repo = 'junegunn/fzf'
build = './install --all'
merged = false

[[plugins]]
repo = 'junegunn/fzf.vim'
depends = 'fzf'

[[plugins]]
repo = 'rhysd/accelerated-jk'
hook_add = '''
  nmap j <Plug>(accelerated_jk_gj)
  nmap k <Plug>(accelerated_jk_gk)
'''

[[plugins]]
repo = 'vim-scripts/YankRing.vim'
hook_add = '''
  let g:yankring_clipboard_monitor=0
'''

[[plugins]]
repo = 'tomtom/tcomment_vim'

[[plugins]]
repo = 'ryanoasis/vim-devicons'

[[plugins]]
repo = 'vim-airline/vim-airline'
hook_add = '''
  let g:airline#extensions#tabline#enabled = 1
  let g:airline_powerline_fonts = 1
  let g:airline#extensions#tabline#fnamemod = ':t'
  let g:airline#extensions#tabline#left_sep = '  '
  let g:airline#extensions#tabline#left_alt_sep = ' '
  let g:airline_left_sep = ' '
  let g:airline_right_sep = ' '
'''

[[plugins]]
repo = 'vim-airline/vim-airline-themes'

[[plugins]]
repo = 'vim-scripts/AnsiEsc.vim'

[[plugins]]
repo = 'editorconfig/editorconfig-vim'

[[plugins]]
repo = 'jiangmiao/auto-pairs'

[[plugins]]
repo = 'rmagatti/auto-session'
# Plugins land on the runtimepath at VimEnter, so requiring them from
# hook_add directly fails during startup — defer with an autocmd.
hook_add = '''
autocmd VimEnter * ++once lua require('auto-session').setup({
      \   enabled = true
      \ })
'''

[[plugins]]
repo = 'nvim-lua/plenary.nvim'

[[plugins]]
repo = 'mikavilpas/yazi.nvim'
hook_add = '''
map <silent> <C-\> :lua require("yazi").yazi()<CR>
'''

[[plugins]]
repo = 'Shougo/echodoc.vim'
hook_add = '''
  let g:echodoc#enable_at_startup = 1
  let g:echodoc#type = 'virtual'
'''

[[plugins]]
# rev pinned: the 'main' branch is a rewrite without the
# nvim-treesitter.configs module this config uses.
repo = 'nvim-treesitter/nvim-treesitter'
rev = 'master'
hook_add = '''
autocmd VimEnter * ++once lua require('nvim-treesitter.configs').setup({
      \   ensure_installed = { 'python' },
      \   highlight = { enable = true },
      \ })
'''

[[plugins]]
repo = 'stevearc/dressing.nvim'

[[plugins]]
repo = 'MunifTanjim/nui.nvim'

[[plugins]]
repo = 'MeanderingProgrammer/render-markdown.nvim'

[[plugins]]
repo = 'famiu/bufdelete.nvim'
